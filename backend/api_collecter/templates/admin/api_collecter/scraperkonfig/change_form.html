{% extends "admin/change_form.html" %}
{% load i18n admin_urls static admin_modify %}

{% block extrahead %}{{ block.super }}
<script src="{% static 'admin/js/vendor/jquery/jquery.js' %}"></script>
<style>
    .smart-panel {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        font-family: 'Inter', sans-serif;
    }
    .smart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }
    .btn-smart {
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: 0.2s;
        margin-left: 10px;
    }
    .btn-test { background: #3b82f6; color: white; }
    .btn-auto { background: #10b981; color: white; }
    .btn-test:hover { background: #2563eb; }
    .btn-auto:hover { background: #059669; }
    
    #preview-area {
        margin-top: 20px;
        display: none;
    }
    .preview-card {
        background: white;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 10px;
        display: flex;
        gap: 15px;
    }
    .preview-img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; background: #f1f5f9; }
    .preview-content { flex: 1; }
    .preview-title { font-weight: bold; color: #1e293b; margin-bottom: 4px; }
    .preview-meta { font-size: 12px; color: #64748b; }
    
    .loader {
        border: 3px solid #f3f3f3;
        border-radius: 50%;
        border-top: 3px solid #3498db;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
        display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<script>
    (function($) {
        $(document).ready(function() {
            const objectId = "{{ object_id }}";
            
            // 1. Test Scrape Logic
            $('#btn-test-scrape').click(function(e) {
                e.preventDefault();
                const $btn = $(this);
                const $loader = $('#test-loader');
                const $preview = $('#preview-results');
                
                $btn.prop('disabled', true).css('opacity', 0.5);
                $loader.show();
                $('#preview-area').show();
                $preview.html('<p>Scraping in progress... please wait.</p>');
                
                $.getJSON(`test-scrape/`, function(data) {
                    $btn.prop('disabled', false).css('opacity', 1);
                    $loader.hide();
                    
                    if (data.success) {
                        let html = `<h3>Found ${data.total_found} items (${data.duration.toFixed(1)}s)</h3>`;
                        data.items.forEach(item => {
                            html += `
                            <div class="preview-card">
                                <img src="${item.image_url || ''}" class="preview-img" onerror="this.src='https://via.placeholder.com/80x60?text=No+Img'">
                                <div class="preview-content">
                                    <div class="preview-title">${item.title}</div>
                                    <div class="preview-meta">
                                        URL: <a href="${item.source_url}" target="_blank">${item.source_url.substring(0, 50)}...</a><br>
                                        Date: ${item.published_date || 'N/A'} | Author: ${item.authors ? item.authors.map(a => a.name).join(', ') : 'N/A'}
                                    </div>
                                </div>
                            </div>`;
                        });
                        $preview.html(html);
                    } else {
                        $preview.html(`<div style="color:red;">Error: ${data.error}</div>`);
                    }
                });
            });
            
            // 2. Auto Config Logic
            $('#btn-auto-config').click(function(e) {
                e.preventDefault();
                const url = $('#id_base_url').val();
                if (!url) {
                    alert("Please enter a Base URL first!");
                    return;
                }
                
                const $btn = $(this);
                const $loader = $('#auto-loader');
                
                $btn.prop('disabled', true).css('opacity', 0.5);
                $loader.show();
                
                $.getJSON(`../auto-config/?url=${encodeURIComponent(url)}`, function(data) {
                    $btn.prop('disabled', false).css('opacity', 1);
                    $loader.hide();
                    
                    if (data.success) {
                        // Apply selectors to fields
                        $('#id_selectors').val(JSON.stringify(data.selectors, null, 2));
                        alert(`Successfully detected ${data.detected_count} items! Selectors updated.`);
                    } else {
                        alert("Auto-config failed: " + data.error);
                    }
                });
            });
        });
    })(django.jQuery);
</script>
{% endblock %}

{% block content %}
<div id="content-main">
    <div class="smart-panel">
        <div class="smart-header">
            <div>
                <h2 style="margin:0;">🚀 Smart Scraping Panel</h2>
                <p style="margin:5px 0 0 0; color:#64748b;">Live test your config or auto-detect selectors.</p>
            </div>
            <div style="display:flex; align-items:center;">
                <div id="auto-loader" class="loader" style="margin-right:10px;"></div>
                <button id="btn-auto-config" class="btn-smart btn-auto">✨ Auto Detect</button>
                
                <div id="test-loader" class="loader" style="margin-right:10px; margin-left:20px;"></div>
                <button id="btn-test-scrape" class="btn-smart btn-test">🧪 Test Run</button>
            </div>
        </div>
        
        <div id="preview-area">
            <hr>
            <div id="preview-results"></div>
        </div>
    </div>
    
    {{ block.super }}
</div>
{% endblock %}
